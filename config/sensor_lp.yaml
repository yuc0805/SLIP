hydra:
  run:
    dir: SLIP_result/hydra_log/eval/${now:%Y-%m-%d}/${now:%H-%M-%S}
defaults:
  - dataset: lp_dataset
  - sensor_encoder: rope_vit_base
  

# system:
remark: null
checkpoint: null
output_dir: 'SLIP_result/classification/ckpt' 
log_dir: 'SLIP_result/classification/log'
device: 'cuda'
seed: 0
resume: ''
finetune: null
eval: null
dist_eval: false
world_size: 1
local_rank: -1
dist_on_itp: false
dist_url: 'env://'
distributed: false
gpu: 0
rank: null
dist_backend: null

#train:
batch_size: 64
epochs: 50
accum_iter: 1
start_epoch: 0
num_workers: 4
pin_mem: true

# optim:
betas: (0.9, 0.999)
weight_decay: 1e-3 # mae default 0.0
layer_decay: 0.0
lr: null    
blr: 1e-2 # mae default 1e-1
min_lr: 1e-6
warmup_epochs: 5 # default 10% of the total epochs
max_norm: null
linear_probe: true
