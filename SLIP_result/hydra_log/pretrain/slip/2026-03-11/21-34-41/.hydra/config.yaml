dataset:
  name: opentslm_qa
  input_size:
  - 0
  - 0
  task_name: har_cot
  is_normalize: null
  patch_size: null
  data_dir: data/opentslm_sft_data/${.task_name}
  fold:
    fold_0:
      train: None
      val: None
  task_config:
    har_cot:
      num_classes: 8
      head_type: classification
      is_normalize: false
      patch_size: 4
    sleep_cot:
      num_classes: 6
      head_type: classification
      is_normalize: true
      patch_size: 50
    ecg_cot:
      num_classes: null
      head_type: classification
      is_normalize: true
      patch_size: 20
    tsqa:
      num_classes: 3
      head_type: classification
      is_normalize: true
      patch_size:
        64: 2
        128: 4
        256: 8
        512: 16
    m4_caption:
      num_classes: null
      head_type: generation
      is_normalize: true
      patch_size: null
model:
  name: slip
  _target_: model_factory.SLIP.SLIP
  input_size: ${dataset.input_size}
  sensor_encoder_cfg: ${sensor_encoder}
  max_llm_len: 768
  llm_model_name: google/gemma-3-270m
  unlocked_layers: 4
  split_layer: 12
  use_lora: false
  use_llm: true
  fine_grained: false
  common_dim: 640
  num_heads: 5
  num_img_queries: 64
  caption_loss_weight: 1.0
  contrastive_loss_weight: 1.0
sensor_encoder:
  name: rope_vit_base
  _target_: model_factory.ts_transformer.SensorTransformerModel
  embed_dim: 768
  num_heads: 12
  mlp_ratio: 4
  depth: 12
  dropout_rate: 0.1
  learnable_pos_emb: false
  max_position_embeddings: 4880
  patch_size: null
  channel_attn_type: all_attn
  _recursive_: false
-model: ${model}
remark: SLIP_SFT
checkpoint: null
output_dir: SLIP_result/pretrain/${model.name}/ckpt
log_dir: SLIP_result/pretrain/${model.name}/log
device: cuda
seed: 0
resume: ''
finetune: ckpt/SLIP_gemma270.pth
is_sft: false
eval: null
dist_eval: false
world_size: 1
local_rank: -1
dist_on_itp: false
dist_url: env://
distributed: false
gpu: 0
rank: null
dist_backend: null
linear_probe: sft
evaluate: null
batch_size: 64
accum_iter: 1
epochs: 4
save_every_epoch: 1000
start_epoch: 0
num_workers: 4
prefetch_factor: 2
pin_mem: true
betas:
- 0.9
- 0.999
weight_decay: 0.05
lr: null
blr: 0.001
lora_lr: null
min_lr: 1.0e-07
warmup_epochs: 1
max_norm: 1.0
